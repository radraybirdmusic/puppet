<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRi2 Kinetic Capture Tool v1.2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #121212; }
    </style>
</head>
<body>
    <script>
        let handPose;
        let video;
        let hands = [];
        let prevWrist = { x: 0, y: 0 };
        let velocity = 0;
        let activeBucket = "None";
        let booted = false;

        function preload() {
            handPose = ml5.handPose();
        }

        function setup() {
            createCanvas(windowWidth, windowHeight);
            video = createCapture({ video: { facingMode: "user" }, audio: false });
            video.elt.setAttribute('playsinline', ''); 
            video.hide();
            handPose.detectStart(video, (results) => { hands = results; });
        }

        function draw() {
            background(20);
            if (!booted) {
                renderBoot();
                return;
            }

            // Mirror video to fill screen
            push();
            translate(width, 0); scale(-1, 1);
            image(video, 0, 0, width, height);
            pop();

            // Draw Bucket Zones
            drawZones();

            if (hands.length > 0) {
                let wrist = hands[0].wrist;
                let index = hands[0].index_finger_tip;
                let thumb = hands[0].thumb_tip;

                // 1. Velocity Tracking
                velocity = dist(wrist.x, wrist.y, prevWrist.x, prevWrist.y);
                prevWrist = { x: wrist.x, y: wrist.y };

                // 2. Pinch Detection (The "Click")
                let pinchDist = dist(index.x, index.y, thumb.x, thumb.y);
                let isPinching = pinchDist < 30;

                // 3. Zone Detection
                checkZones(index.x, index.y, isPinching);

                // Visual Cues
                noStroke();
                fill(isPinching ? 'rgba(255, 255, 0, 0.6)' : 'rgba(255, 255, 255, 0.4)');
                ellipse(index.x, index.y, 20); // Track finger
            }
            renderHUD();
        }

        function drawZones() {
            noFill(); stroke(255, 50);
            rect(10, 10, 100, 100); // Top Left (Bucket 1)
            rect(width - 110, 10, 100, 100); // Top Right (Bucket 2)
            fill(255, 100); noStroke();
            textAlign(CENTER);
            text("B1", 60, 65); text("B2", width - 60, 65);
        }

        function checkZones(fx, fy, pinching) {
            // Check if finger is in Top Left Zone
            if (fx < 110 && fy < 110) {
                if (pinching) activeBucket = "Bucket 1";
            } else if (fx > width - 110 && fy < 110) {
                if (pinching) activeBucket = "Bucket 2";
            }
        }

        function renderBoot() {
            fill(255); textAlign(CENTER); textSize(20);
            text("KINETIC TOOL v1.2", width/2, height/2);
            text("TAP TO START", width/2, height/2 + 40);
        }

        function renderHUD() {
            fill(0, 150); rect(0, height - 80, width, 80);
            fill(255); textAlign(LEFT); textSize(16);
            text(`ACTIVE: ${activeBucket}`, 20, height - 50);
            text(`VELOCITY: ${nfc(velocity, 1)}`, 20, height - 25);
        }

        function mousePressed() { if (!booted) { video.loop(); booted = true; } }
        function windowResized() { resizeCanvas(windowWidth, windowHeight); }
    </script>
</body>
</html>
