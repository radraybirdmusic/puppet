<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRi1 Kinetic Bridge v1.3</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050505; color: #fff; font-family: monospace; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script>
        /**
         * CRi1 Recipe Vault | Season 2 Episode 2026-05-06
         * Master Kinetic Bridge v1.3 (GitHub Private Edition)
         */

        let handPose;
        let video;
        let hands = [];
        let prevWrist = { x: 0, y: 0 };
        let velocity = 0;
        let isBooted = false;
        let modelReady = false;

        function preload() {
            // Load the next-gen AI model
            handPose = ml5.handPose();
        }

        function setup() {
            createCanvas(windowWidth, windowHeight);
            
            // iPhone 16e Field Constraints
            const constraints = {
                video: { facingMode: "user" },
                audio: false
            };

            video = createCapture(constraints);
            video.elt.setAttribute('playsinline', ''); // Essential for iPhone Safari
            video.size(640, 480);
            video.hide();

            // v1.3 Detection Loop
            handPose.detectStart(video, (results) => {
                hands = results;
                modelReady = true;
            });
        }

        function draw() {
            background(15);

            if (!isBooted) {
                renderBootScreen();
                return;
            }

            // Mirror and center the video feed
            push();
            translate(width, 0); scale(-1, 1);
            image(video, 0, 0, width, height);

            // Kinetic Logic & Skeleton Overlay
            if (modelReady && hands.length > 0) {
                drawSkeleton(hands[0]);
                calculateKinematics(hands[0]);
            }
            pop();

            renderHUD();
        }

        function calculateKinematics(currentHand) {
            // v1.3 uses direct 'wrist' object for velocity tracking
            let wrist = currentHand.wrist;
            velocity = dist(wrist.x, wrist.y, prevWrist.x, prevWrist.y);
            
            // Visual Trigger Overlay (Threshold: 12)
            if (velocity > 12) {
                fill(0, 255, 0, 80); // Active Motion
                rect(0, 0, width, height);
            }

            prevWrist.x = wrist.x;
            prevWrist.y = wrist.y;
        }

        function drawSkeleton(hand) {
            // Draw all 21 keypoints for visual validation
            for (let i = 0; i < hand.keypoints.length; i++) {
                let kp = hand.keypoints[i];
                fill(0, 255, 100);
                noStroke();
                circle(kp.x, kp.y, 8);
            }
        }

        function renderBootScreen() {
            fill(255);
            textAlign(CENTER, CENTER);
            textSize(22);
            text("KINETIC BRIDGE v1.3", width/2, height/2 - 20);
            textSize(14);
            fill(120);
            text("TAP SCREEN TO BOOT SYSTEM", width/2, height/2 + 25);
        }

        function renderHUD() {
            fill(0, 200);
            rect(0, 0, width, 65);
            fill(255);
            textAlign(LEFT);
            textSize(13);
            let status = !modelReady ? "LOADING AI..." : (hands.length > 0 ? "TRACKING" : "IDLE: SHOW HAND");
            text(`[ VER: 1.3 ] STATUS: ${status}`, 20, 30);
            text(`[ KINETIC ] VELOCITY: ${nfc(velocity, 1)}`, 20, 50);
        }

        function mousePressed() {
            if (!isBooted) {
                video.loop();
                isBooted = true;
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
