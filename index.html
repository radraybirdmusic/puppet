<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRi2 Kinetic Capture Bridge v1.0</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #121212; font-family: sans-serif; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script>
        /**
         * CRi1 Recipe Vault: S2 Episode 2026-05-04
         * Master Kinetic Bridge (p5.js + ml5.js v1.0)
         */

        let handPose;
        let video;
        let hands = [];
        let prevWrist = { x: 0, y: 0 };
        let velocity = 0;
        let systemBooted = false;
        let modelLoaded = false;

        function preload() {
            // Initialize Next-Gen handPose
            handPose = ml5.handPose();
        }

        function setup() {
            createCanvas(windowWidth, windowHeight);
            
            // iPhone 16e Specific Constraints
            const constraints = {
                video: {
                    facingMode: "user",
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                },
                audio: false
            };

            video = createCapture(constraints);
            video.elt.setAttribute('playsinline', ''); // Essential for iPhone
            video.hide();

            // Start the detection engine
            handPose.detectStart(video, (results) => {
                hands = results;
                modelLoaded = true;
            });
        }

        function draw() {
            background(20);

            if (!systemBooted) {
                renderBootScreen();
                return;
            }

            // Draw Mirrored Feedback
            push();
            translate(width, 0);
            scale(-1, 1);
            // Calculate aspect ratio to fit screen
            let videoAspect = video.width / video.height;
            let screenAspect = width / height;
            if (screenAspect > videoAspect) {
                image(video, 0, 0, width, width / videoAspect);
            } else {
                image(video, 0, 0, height * videoAspect, height);
            }
            pop();

            // Logic for Wrist tracking & Velocity
            if (modelLoaded && hands.length > 0) {
                let wrist = hands[0].wrist;
                
                // Euclidean Distance (Motion Velocity)
                velocity = dist(wrist.x, wrist.y, prevWrist.x, prevWrist.y);
                
                // Motion Trigger (Thresholding)
                let active = velocity > 12; 
                fill(active ? 'rgba(0, 255, 0, 0.4)' : 'rgba(255, 0, 0, 0.4)');
                rect(0, 0, width, height);

                prevWrist.x = wrist.x;
                prevWrist.y = wrist.y;
            }

            renderHUD();
        }

        function renderBootScreen() {
            fill(255);
            textAlign(CENTER, CENTER);
            textSize(22);
            text("KINETIC CAPTURE BRIDGE", width/2, height/2 - 30);
            textSize(16);
            fill(150);
            text("TAP SCREEN TO ENGAGE SYSTEM", width/2, height/2 + 20);
        }

        function renderHUD() {
            fill(0, 180);
            rect(0, 0, width, 70);
            fill(255);
            textAlign(LEFT);
            textSize(14);
            let statusText = !modelLoaded ? "LOADING AI..." : (hands.length > 0 ? "TRACKING ACTIVE" : "READY: SHOW HAND");
            text(`STATUS: ${statusText}`, 20, 30);
            text(`VELOCITY: ${nfc(velocity, 1)}`, 20, 50);
        }

        function mousePressed() {
            if (!systemBooted) {
                video.loop();
                systemBooted = true;
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
